---
name: Actionlint

on:
    workflow_call:

permissions:
    contents: read

jobs:
    actionlint:
        name: Lint workflows
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  persist-credentials: false
            - name: Run actionlint
              uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8
              with:
                  matcher: true
