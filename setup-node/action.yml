---
name: Setup Node.js
description: Set up Node.js with npm cache and optionally install dependencies

inputs:
    node-version:
        required: true
        description: Node.js version to set up (e.g. 20, 22)
    package-manager:
        required: false
        default: 'npm'
        description: Package manager to use for caching (npm, yarn, pnpm)
    install:
        required: false
        default: 'true'
        description: Install dependencies after setup (true/false)
    install-command:
        required: false
        default: ''
        description: Override the default install command (e.g. 'npm ci', 'pnpm install --frozen-lockfile')

runs:
    using: composite
    steps:
        - name: Set up Node.js ${{ inputs.node-version }}
          uses: actions/setup-node@v5
          with:
              node-version: ${{ inputs.node-version }}
              cache: ${{ inputs.package-manager }}

        - name: Check Node.js version
          run: |
              node --version
              ${{ inputs.package-manager }} --version
          shell: bash

        - name: Install dependencies
          if: inputs.install == 'true'
          run: |
              if [ -n "${{ inputs.install-command }}" ]; then
                ${{ inputs.install-command }}
              elif [ "${{ inputs.package-manager }}" = "npm" ]; then
                npm ci
              elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
                yarn install --frozen-lockfile
              elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
                pnpm install --frozen-lockfile
              else
                echo "Unknown package manager: ${{ inputs.package-manager }}"
                exit 1
              fi
          shell: bash
