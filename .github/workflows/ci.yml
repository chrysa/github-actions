---
name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
            - feature/**
            - fix/**
            - release/**
    workflow_dispatch:

permissions:
    checks: write
    contents: write
    pull-requests: write

jobs:
    validate:
        name: Validate actions YAML
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@v6

            - name: Check all action.yml files are valid YAML
              run: |
                  python3 -c "
                  import yaml, pathlib, sys
                  errors = []
                  for f in sorted(pathlib.Path('.').glob('*/action.yml')):
                      try:
                          data = yaml.safe_load(f.read_text())
                          has_runs = 'runs' in (data or {})
                          name = (data or {}).get('name', 'MISSING')
                          status = 'OK' if has_runs else 'ERR'
                          print(f'{status}  {f}  name={name!r}')
                          if not has_runs:
                              errors.append(str(f))
                      except yaml.YAMLError as e:
                          print(f'ERR  {f}: {e}')
                          errors.append(str(f))
                  sys.exit(len(errors))
                  "
              shell: bash

    release:
        name: Tag release
        needs: validate
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install GitVersion
              uses: gittools/actions/gitversion/setup@v4.4.2
              with:
                  versionSpec: 6.x

            - name: Determine version
              id: gitversion
              uses: gittools/actions/gitversion/execute@v4.4.2

            - name: Debug GitVersion outputs
              run: |
                  echo "semVer=${{ steps.gitversion.outputs.semVer }}"
                  echo "majorMinorPatch=${{ steps.gitversion.outputs.majorMinorPatch }}"
                  echo "preReleaseTag=${{ steps.gitversion.outputs.preReleaseTag }}"
                  echo "preReleaseLabelWithDash=${{ steps.gitversion.outputs.preReleaseLabelWithDash }}"
              shell: bash

            - name: Check if tag exists
              id: tag_check
              run: |
                  VERSION="v${{ steps.gitversion.outputs.majorMinorPatch }}"
                  if git rev-parse --quiet --verify "refs/tags/$VERSION" > /dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi
              shell: bash

            - name: Generate CHANGELOG.md
              if: steps.tag_check.outputs.exists == 'false'
              uses: orhun/git-cliff-action@v4
              with:
                  config: cliff.toml
                  args: --tag v${{ steps.gitversion.outputs.majorMinorPatch }}
              env:
                  OUTPUT: CHANGELOG.md
                  GITHUB_REPO: ${{ github.repository }}

            - name: Generate release notes
              if: steps.tag_check.outputs.exists == 'false'
              uses: orhun/git-cliff-action@v4
              with:
                  config: cliff.toml
                  args: --unreleased --tag v${{ steps.gitversion.outputs.majorMinorPatch }} --strip all
              env:
                  OUTPUT: release_notes.md
                  GITHUB_REPO: ${{ github.repository }}

            - name: Commit, tag and push
              if: steps.tag_check.outputs.exists == 'false'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  VERSION="v${{ steps.gitversion.outputs.majorMinorPatch }}"
                  MAJOR="v${{ steps.gitversion.outputs.major }}"
                  git add CHANGELOG.md
                  git diff --staged --quiet || git commit -m "chore: update CHANGELOG.md for $VERSION [skip ci]"
                  git tag -a "$VERSION" -m "Release $VERSION"
                  git push origin HEAD:main --follow-tags
                  git tag -fa "$MAJOR" -m "Latest v${{ steps.gitversion.outputs.major }}"
                  git push origin "$MAJOR" --force
              shell: bash

            - name: Create GitHub Release
              if: steps.tag_check.outputs.exists == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.gitversion.outputs.majorMinorPatch }}
                  name: v${{ steps.gitversion.outputs.majorMinorPatch }}
                  body_path: release_notes.md
                  make_latest: true
