---
name: pre-commit

on:
    workflow_call:

permissions:
    contents: read

jobs:
    pre-commit:
        name: Run pre-commit hooks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: '3.14'
            - uses: pre-commit/action@v3.0.1
              env:
                  SKIP: no-commit-to-branch
