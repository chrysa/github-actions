description: Download Python analysis reports and run SonarCloud scan with Python-specific
  configuration
inputs:
  coverage-report:
    default: reports/coverage.xml
    description: Path to coverage XML report (Cobertura format)
    required: false
  github-token:
    description: GitHub token
    required: true
  js-coverage-report:
    default: ''
    description: Optional path to a JavaScript/TypeScript LCOV coverage report (e.g.
      web/coverage/lcov.info). When set AND the file exists, Sonar consumes it via
      sonar.javascript.lcov.reportPaths so TS coverage counts alongside Python. LCOV
      SF paths must be relative to the repo root (matching sonar.sources). Empty (the
      default) leaves behaviour identical to before — no JS flag is emitted.
    required: false
  junit-report:
    default: reports/junit.xml
    description: Path to JUnit XML test report
    required: false
  mypy-report:
    default: reports/mypy.txt
    description: Path to mypy text report
    required: false
  organization:
    description: SonarCloud organization slug
    required: true
  project-key:
    description: SonarCloud project key (e.g. chrysa_my-project)
    required: true
  project-name:
    description: SonarCloud project display name
    required: true
  python-version:
    description: Python version used for analysis (e.g. 3.14)
    required: true
  ruff-report:
    default: reports/ruff.json
    description: Path to ruff JSON report
    required: false
  sonar-token:
    description: SonarCloud token
    required: true
  sources:
    default: src
    description: Comma-separated source directories (e.g. src,lib)
    required: false
  tests:
    default: tests
    description: Comma-separated test directories (e.g. tests,test). Directories that
      do not exist are skipped (sonar.tests omitted entirely when none are present).
      Existing test dirs are also added to sonar.exclusions so a broad sonar.sources
      (e.g. ".") does not index them twice.
    required: false
name: SonarCloud scan (Python)
runs:
  steps:
  - continue-on-error: true
    name: Download test results (${{ inputs.python-version }})
    uses: actions/download-artifact@v8
    with:
      name: test-results-${{ inputs.python-version }}
      path: reports/
  - continue-on-error: true
    name: Download ruff report
    uses: actions/download-artifact@v8
    with:
      name: ruff-report
      path: reports/
  - continue-on-error: true
    name: Download mypy report
    uses: actions/download-artifact@v8
    with:
      name: mypy-report
      path: reports/
  - name: List reports available for SonarCloud
    run: ls -lh reports/ || echo "reports/ directory is empty or missing"
    shell: bash
  - env:
      SONAR_TESTS_INPUT: ${{ inputs.tests }}
    id: sonar-tests
    name: Resolve test directories and Sonar exclusions
    run: "base='**/__pycache__/**,**/*.egg-info/**,**/.git/**,**/node_modules/**'\n\
      tests_arg=\"\"\nexisting=()\nIFS=',' read -ra dirs <<< \"$SONAR_TESTS_INPUT\"\
      \nfor d in \"${dirs[@]}\"; do\n  trimmed=\"$(echo \"$d\" | xargs)\"\n  if [\
      \ -n \"$trimmed\" ] && [ -d \"$trimmed\" ]; then\n    existing+=(\"$trimmed\"\
      )\n  fi\ndone\nexcl=\"$base\"\nif [ \"${#existing[@]}\" -gt 0 ]; then\n  joined=\"\
      $(IFS=','; echo \"${existing[*]}\")\"\n  tests_arg=\"-Dsonar.tests=$joined\"\
      \n  # Keep test dirs out of the main source set so sonar.sources=\".\" does\
      \ not index them twice.\n  for d in \"${existing[@]}\"; do\n    excl=\"$excl,$d/**\"\
      \n  done\nelse\n  echo \"No configured test directories exist (input: '$SONAR_TESTS_INPUT');\
      \ omitting -Dsonar.tests\"\nfi\necho \"tests_arg=$tests_arg\" >> \"$GITHUB_OUTPUT\"\
      \necho \"exclusions=$excl\" >> \"$GITHUB_OUTPUT\"\n"
    shell: bash
  - env:
      JS_COVERAGE_REPORT: ${{ inputs.js-coverage-report }}
    id: sonar-js
    name: Resolve JavaScript/TypeScript LCOV coverage
    run: |
      js_cov_arg=""
      trimmed="$(echo "$JS_COVERAGE_REPORT" | xargs)"
      if [ -n "$trimmed" ]; then
        if [ -f "$trimmed" ]; then
          js_cov_arg="-Dsonar.javascript.lcov.reportPaths=$trimmed"
        else
          echo "js-coverage-report='$trimmed' set but file not found; omitting sonar.javascript.lcov.reportPaths"
        fi
      fi
      echo "js_cov_arg=$js_cov_arg" >> "$GITHUB_OUTPUT"
    shell: bash
  - env:
      GITHUB_TOKEN: ${{ inputs.github-token }}
      SONAR_TOKEN: ${{ inputs.sonar-token }}
    name: SonarCloud Scan
    uses: SonarSource/sonarqube-scan-action@v5
    with:
      args: '-Dsonar.projectKey=${{ inputs.project-key }} -Dsonar.organization=${{
        inputs.organization }} -Dsonar.projectName=${{ inputs.project-name }} -Dsonar.sourceEncoding=UTF-8
        -Dsonar.sources=${{ inputs.sources }} ${{ steps.sonar-tests.outputs.tests_arg
        }} -Dsonar.python.version=${{ inputs.python-version }} -Dsonar.python.coverage.reportPaths=${{
        inputs.coverage-report }} -Dsonar.python.ruff.reportPaths=${{ inputs.ruff-report
        }} -Dsonar.python.mypy.reportPaths=${{ inputs.mypy-report }} -Dsonar.python.xunit.reportPath=${{
        inputs.junit-report }} ${{ steps.sonar-js.outputs.js_cov_arg }} -Dsonar.exclusions=${{
        steps.sonar-tests.outputs.exclusions }}

        '
  using: composite
