---
name: Enforce Feature Branch Policy

on:
    workflow_call:
        inputs:
            runner:
                description: "runs-on label (chrysa-arc self-hosted, or ubuntu-latest for public repos)"
                type: string
                default: chrysa-arc

permissions:
    contents: read

jobs:
    branch-policy:
        if: github.actor != 'dependabot[bot]'
        runs-on: ${{ inputs.runner || 'chrysa-arc' }}
        steps:
            - name: Validate PR source branch naming
              shell: bash
              env:
                  BRANCH_NAME: ${{ github.head_ref }}
              run: |
                  branch="$BRANCH_NAME"
                  pattern='^(feature|feat|fix|chore|docs|refactor|test|ci|build|perf|hotfix)/[a-z0-9._-]+$'
                  if [[ ! "$branch" =~ $pattern ]]; then
                    echo "Invalid branch name: $branch"
                    echo "Expected: type/short-description (e.g. feat/add-auth-flow)"
                    exit 1
                  fi
