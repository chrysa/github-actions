---
name: Quality Gate Check

on:
  workflow_call:
    inputs:
      runner:
        description: "runs-on label (chrysa-arc self-hosted, or ubuntu-latest for public repos)"
        type: string
        default: chrysa-arc

permissions:
  checks: write
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: No-Regression Quality Gates
    runs-on: ${{ inputs.runner || 'chrysa-arc' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Set up Node.js (if needed)
        continue-on-error: true
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install --only-binary :all: -r requirements.txt; fi
          if [ -f package.json ]; then npm ci; fi
      - name: Run quality gate verification
        id: quality-gate
        run: |
          if make -n quality-gate-verify >/dev/null 2>&1; then
            make quality-gate-verify
          else
            echo "::notice::No 'quality-gate-verify' target found - skipping quality gate (repo not onboarded)."
          fi
      - name: Report quality gate status
        if: always()
        run: |
          if [ "${{ steps.quality-gate.outcome }}" == 'success' ]; then
            echo "✅ All quality gates passed"
          else
            echo "❌ Quality gate regression detected"
            exit 1
          fi
