---
name: Secret scan

on:
    workflow_call:

jobs:
    gitleaks:
        name: Detect secrets (Gitleaks)
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        steps:
            - uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
            - uses: gitleaks/gitleaks-action@v2.3.9
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
