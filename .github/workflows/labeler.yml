"on":
  pull_request: null
  workflow_call:
    inputs:
      runner:
        description: "runs-on label (chrysa-arc self-hosted, or ubuntu-latest for public repos)"
        type: string
        default: chrysa-arc
  workflow_dispatch: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  labels:
    name: Apply labels on pull request
    runs-on: ${{ inputs.runner || 'chrysa-arc' }}
    steps:
    - name: Get Code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
      with:
        sync-labels: true
name: Pull Request Labels
permissions:
  contents: read
  pull-requests: write
run-name: "\U0001F3F7\uFE0F apply labeler by ${{ github.actor }}"
