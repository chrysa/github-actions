---
name: Label Pull Request Size

on:
    workflow_call:

permissions:
    contents: read
    pull-requests: write

jobs:
    size-label:
        runs-on: ubuntu-latest
        steps:
            - name: Label pull request by size
              uses: pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  fail_if_xl: false
                  l_max_size: 800
                  m_max_size: 200
                  s_max_size: 50
                  xs_max_size: 20
