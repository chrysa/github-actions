---
name: Sync labels

on:
    push:
        branches: [main]
        paths:
            - .github/labels.yml
            - .github/workflows/sync-labels.yml
    workflow_dispatch:

permissions:
    issues: write

jobs:
    sync:
        runs-on: ubuntu-latest
        name: Sync repository labels from labels.yml
        steps:
            - uses: actions/checkout@v4

            - name: Sync labels
              uses: EndBug/label-sync@v2
              with:
                  config-file: .github/labels.yml
                  delete-other-labels: false
