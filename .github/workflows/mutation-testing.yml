---
name: Mutation Testing

on:
    workflow_call:
        inputs:
            paths:
                description: 'Comma-separated paths to mutate'
                required: false
                default: 'code'
                type: string
            threshold:
                description: 'Minimum mutation score (0-100)'
                required: false
                default: '70'
                type: string

permissions:
    contents: read

jobs:
    mutation:
        name: Mutmut
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.14'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]" mutmut

            - name: Run mutmut
              id: mutmut
              run: |
                  mutmut run \
                    --paths-to-mutate "${{ inputs.paths }}" \
                    --runner "python -m pytest tests/ -x -q --no-header" \
                    --no-progress \
                    || true

            - name: Compute mutation score
              id: score
              run: |
                  KILLED=$(mutmut results 2>/dev/null | grep -c "^Killed" || echo 0)
                  SURVIVED=$(mutmut results 2>/dev/null | grep -c "^Survived" || echo 0)
                  TOTAL=$((KILLED + SURVIVED))
                  if [ "$TOTAL" -eq 0 ]; then
                    echo "score=100" >> "$GITHUB_OUTPUT"
                  else
                    SCORE=$(( KILLED * 100 / TOTAL ))
                    echo "score=$SCORE" >> "$GITHUB_OUTPUT"
                  fi
                  {
                    echo "killed=$KILLED"
                    echo "survived=$SURVIVED"
                    echo "total=$TOTAL"
                  } >> "$GITHUB_OUTPUT"

            - name: Show surviving mutants
              if: always()
              run: mutmut results || true

            - name: Fail if score below threshold
              run: |
                  SCORE=${{ steps.score.outputs.score }}
                  THRESHOLD=${{ inputs.threshold }}
                  echo "Mutation score: ${SCORE}% (threshold: ${THRESHOLD}%)"
                  if [ "$SCORE" -lt "$THRESHOLD" ]; then
                    echo "âťŚ Mutation score ${SCORE}% is below threshold ${THRESHOLD}%"
                    exit 1
                  fi
                  echo "âś… Mutation score ${SCORE}% meets threshold ${THRESHOLD}%"

            - name: Upload mutmut results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: mutmut-results
                  path: .mutmut-cache
                  retention-days: 7
