---
name: Secret scan

on:
    workflow_call:

permissions:
    contents: read

jobs:
    gitleaks:
        name: Detect secrets (Gitleaks)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
