---
default_language_version:
    python: python3
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: f1dff44d3a9ae852957f34def96390f28719c232
      hooks:
          - id: check-json
          - id: check-yaml
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: detect-private-key
          - id: no-commit-to-branch
            args: [--branch, main]
    - repo: https://github.com/igorshubovych/markdownlint-cli
      rev: f7ed74202ac8ec26bab4a68359556c5243df142f
      hooks:
          - id: markdownlint
            args: [--fix]
            stages: [manual]
    - repo: https://github.com/lovesegfault/beautysh
      rev: 34c3b3da0233e76d7d1ad90a78f3679185ecf31c
      hooks:
          - id: beautysh
            args: [--indent-size, '4']
    - repo: https://github.com/openstack/bashate
      rev: ec2f2400915200d633299612a02d7d285e4be24c
      hooks:
          - id: bashate
            args: [--ignore=E006,E020]
    - repo: https://github.com/chrysa/pre-commit-tools
      rev: v0.1.1-73
      hooks:
          - id: yaml-sorter
            exclude: '^(\.github/|GitVersion\.yml)'
          - id: json-sorter
          - id: env-file-check
